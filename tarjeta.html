<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>¡Feliz Cumpleaños!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --gold: #e8b84b;
        --deep-gold: #b8861c;
        --champagne: #f5e9c8;
        --blush: #f7d6e0;
        --rose: #e07a9a;
        --deep-rose: #b5506e;
        --cream: #fdf9f0;
        --ink: #1a1008;
        --mint: #a8d8b9;
        --confetti1: #e07a9a;
        --confetti2: #e8b84b;
        --confetti3: #7ab8e8;
        --confetti4: #a87ae8;
        --confetti5: #7ae8a0;
      }

      html,
      body {
        height: 100%;
        background: var(--cream);
        font-family: "Cormorant Garamond", serif;
        color: var(--ink);
        overflow-x: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      /* ── CONFETTI BACKGROUND ── */
      .bg-confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .confetti-piece {
        position: absolute;
        opacity: 0;
        animation: confettiFall linear infinite;
      }
      .confetti-rect {
        width: 8px;
        height: 14px;
        border-radius: 2px;
      }
      .confetti-circle {
        width: 9px;
        height: 9px;
        border-radius: 50%;
      }
      .confetti-star {
        width: 10px;
        height: 10px;
        clip-path: polygon(
          50% 0%,
          61% 35%,
          98% 35%,
          68% 57%,
          79% 91%,
          50% 70%,
          21% 91%,
          32% 57%,
          2% 35%,
          39% 35%
        );
      }

      @keyframes confettiFall {
        0% {
          transform: translateY(-60px) rotate(0deg) scale(1);
          opacity: 0.9;
        }
        80% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(110vh) rotate(720deg) scale(0.6);
          opacity: 0;
        }
      }

      /* ── WRAPPER ── */
      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 28px 40px;
      }

      /* ── BALLOON DECO ── */
      .balloons-top {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 200px;
        pointer-events: none;
        overflow: hidden;
      }
      .balloon {
        position: absolute;
        width: 36px;
        height: 44px;
        border-radius: 50% 50% 45% 45%;
        opacity: 0;
        animation: balloonFloat ease-in-out both;
      }
      .balloon::after {
        content: "";
        position: absolute;
        bottom: -18px;
        left: 50%;
        width: 1px;
        height: 18px;
        background: rgba(0, 0, 0, 0.2);
        transform: translateX(-50%);
      }
      .balloon:nth-child(1) {
        left: 6%;
        background: var(--confetti1);
        animation-delay: 0.5s;
        animation-duration: 4s;
      }
      .balloon:nth-child(2) {
        left: 16%;
        background: var(--confetti2);
        animation-delay: 0.8s;
        animation-duration: 5s;
      }
      .balloon:nth-child(3) {
        left: 78%;
        background: var(--confetti3);
        animation-delay: 0.6s;
        animation-duration: 4.5s;
      }
      .balloon:nth-child(4) {
        left: 88%;
        background: var(--confetti4);
        animation-delay: 1s;
        animation-duration: 3.8s;
      }
      .balloon:nth-child(5) {
        left: 50%;
        background: var(--confetti5);
        animation-delay: 0.3s;
        animation-duration: 5.2s;
      }

      @keyframes balloonFloat {
        0% {
          opacity: 0;
          transform: translateY(80px) scale(0.5);
        }
        30% {
          opacity: 1;
        }
        60% {
          transform: translateY(-8px) scale(1.05);
        }
        75% {
          transform: translateY(-2px) scale(0.97);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .balloon:nth-child(1),
      .balloon:nth-child(3) {
        animation:
          balloonFloat ease-in-out both,
          bobble 3s ease-in-out 2s infinite;
      }
      .balloon:nth-child(2),
      .balloon:nth-child(4) {
        animation:
          balloonFloat ease-in-out both,
          bobble 3.5s ease-in-out 2.3s infinite;
      }
      .balloon:nth-child(5) {
        animation:
          balloonFloat ease-in-out both,
          bobble 4s ease-in-out 1.8s infinite;
      }
      @keyframes bobble {
        0%,
        100% {
          transform: translateY(0) rotate(-2deg);
        }
        50% {
          transform: translateY(-6px) rotate(2deg);
        }
      }

      /* ── HEADER ── */
      .header {
        text-align: center;
        margin-top: 35px;
      }
      .header .feliz {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 1.5rem;
        color: var(--rose);
        letter-spacing: 0.08em;
        display: block;
        animation: elDrop 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }
      .header .cumple {
        font-family: "Playfair Display", serif;
        font-size: 3.4rem;
        font-weight: 700;
        line-height: 1.05;
        color: var(--ink);
        letter-spacing: -0.02em;
        display: block;
        animation:
          numberBurst 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both,
          shimmerGold 3s ease-in-out 2.2s infinite;
      }
      @keyframes shimmerGold {
        0%,
        100% {
          text-shadow: none;
        }
        50% {
          text-shadow:
            0 0 20px rgba(232, 184, 75, 0.7),
            0 0 40px rgba(232, 184, 75, 0.35);
        }
      }
      .header .anos {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 2rem;
        color: var(--deep-rose);
        margin-top: -4px;
        display: block;
        animation: marzoSlide 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
      }
      .header .dots {
        color: var(--gold);
        font-style: normal;
      }
      .header .subtitle {
        font-size: 1.05rem;
        font-weight: 300;
        color: var(--ink);
        text-transform: uppercase;
        letter-spacing: 0.22em;
        margin-top: 4px;
        display: block;
        animation: subtitleReveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) 1.3s both;
      }

      /* ── DIVIDER ── */
      .divider {
        width: 60px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        margin: 10px 0;
        animation: dividerExpand 0.9s ease 1.7s both;
        transform-origin: center;
      }

      /* ── BIRTHDAY CAKE ILLUSTRATION ── */
      .cake-wrap {
        margin: -5px 0 4px;
        animation:
          womanEntrance 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both,
          floatCake 4s ease-in-out 2.5s infinite;
      }
      @keyframes floatCake {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-10px) rotate(1deg);
        }
      }
      .cake-svg {
        width: 150px;
        height: auto;
        filter: drop-shadow(0 8px 28px rgba(184, 134, 28, 0.3));
      }

      /* Candle flame flicker */
      .flame {
        animation: flicker 0.6s ease-in-out infinite alternate;
        transform-origin: bottom center;
      }
      .flame:nth-child(2) {
        animation-delay: 0.15s;
      }
      .flame:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes flicker {
        0% {
          transform: scaleX(1) scaleY(1) rotate(-2deg);
          opacity: 1;
        }
        100% {
          transform: scaleX(0.85) scaleY(1.15) rotate(2deg);
          opacity: 0.85;
        }
      }

      /* ── POEM TEXT ── */
      .poem {
        text-align: center;
        margin-top: 0px;
      }
      .poem p {
        font-size: 1.22rem;
        font-style: italic;
        line-height: 1.3;
        color: var(--ink);
        font-weight: 300;
      }
      .poem .highlight {
        color: var(--deep-gold);
        font-weight: 400;
      }
      .poem .highlight-rose {
        color: var(--deep-rose);
        font-weight: 400;
      }
      .poem-line {
        display: block;
        opacity: 0;
        animation: lineReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .poem-line:nth-child(1) {
        animation-delay: 2s;
      }
      .poem-line:nth-child(2) {
        animation-delay: 2.25s;
      }
      .poem-line:nth-child(3) {
        animation-delay: 2.5s;
      }
      .poem-line:nth-child(4) {
        animation-delay: 2.75s;
      }
      .poem-line:nth-child(5) {
        animation-delay: 3s;
      }
      .poem-line:nth-child(6) {
        animation-delay: 3.25s;
      }
      .poem-line:nth-child(7) {
        animation-delay: 3.5s;
      }
      .poem-line:nth-child(8) {
        animation-delay: 3.75s;
      }
      .poem-line:nth-child(9) {
        animation-delay: 4s;
      }
      .poem-line:nth-child(10) {
        animation-delay: 4.25s;
      }
      .poem-line:nth-child(11) {
        animation-delay: 4.5s;
      }
      .poem-line:nth-child(12) {
        animation-delay: 4.75s;
      }
      .poem-line:nth-child(13) {
        animation-delay: 5s;
      }
      .poem-line:nth-child(14) {
        animation-delay: 5.25s;
      }
      .poem-line:nth-child(15) {
        animation-delay: 5.5s;
      }
      .poem-line:nth-child(16) {
        animation-delay: 5.75s;
      }

      /* ── FLORAL ACCENT ── */
      .floral {
        font-size: 1.4rem;
        letter-spacing: 0.4em;
        color: var(--gold);
        margin: 14px 0 10px;
        animation: floralSpin 1s cubic-bezier(0.34, 1.56, 0.64, 1) 3.5s both;
      }

      /* ── YOUTUBE / PLAY BUTTON ── */
      .yt-section {
        padding-top: 28px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        animation: fadeUp 0.8s ease 4s both;
        width: 100%;
      }
      .yt-label {
        font-size: 0.85rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--deep-rose);
        opacity: 0.75;
      }
      .yt-play-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        transition: transform 0.2s;
        animation: pulse 2.5s ease-in-out 4.5s infinite;
      }
      .yt-play-btn:hover,
      .yt-play-btn:active {
        transform: scale(1.1);
        animation: none;
      }
      .yt-play-icon svg {
        width: 90px;
        height: 90px;
        filter: drop-shadow(0 6px 20px rgba(232, 184, 75, 0.45));
      }

      /* ── MODAL ── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(26, 16, 8, 0.75);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-content {
        width: 92vw;
        max-width: 420px;
        background: var(--cream);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 12px 48px rgba(26, 16, 8, 0.45);
        position: relative;
        animation: popUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }
      @keyframes popUp {
        from {
          opacity: 0;
          transform: scale(0.82);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .modal-close {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 10;
        background: var(--rose);
        color: #fff;
        border: none;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        font-size: 0.9rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        transition: background 0.2s;
      }
      .modal-close:hover {
        background: var(--deep-rose);
      }
      .modal-video {
        aspect-ratio: 16/9;
        width: 100%;
      }
      .modal-video iframe {
        width: 100%;
        height: 100%;
        display: block;
      }

      /* ══════════════════
       KEYFRAMES
    ══════════════════ */
      @keyframes elDrop {
        0% {
          opacity: 0;
          transform: translateY(-80px) rotate(-20deg) scale(0.5);
          filter: blur(8px);
        }
        60% {
          opacity: 1;
          transform: translateY(8px) rotate(3deg) scale(1.1);
        }
        80% {
          transform: translateY(-3px) rotate(-1deg) scale(0.97);
        }
        100% {
          opacity: 1;
          transform: translateY(0) rotate(0) scale(1);
        }
      }
      @keyframes numberBurst {
        0% {
          opacity: 0;
          transform: scale(5) rotate(-20deg);
          filter: blur(18px) brightness(3);
        }
        40% {
          opacity: 1;
          filter: blur(0) brightness(2);
          color: var(--gold);
        }
        65% {
          transform: scale(0.88) rotate(4deg);
          color: var(--ink);
        }
        80% {
          transform: scale(1.08) rotate(-2deg);
        }
        90% {
          transform: scale(0.97) rotate(1deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0);
        }
      }
      @keyframes marzoSlide {
        0% {
          opacity: 0;
          transform: translateY(60px) skewY(8deg) scale(0.8);
          filter: blur(6px);
        }
        60% {
          opacity: 1;
          transform: translateY(-8px) skewY(-2deg) scale(1.05);
        }
        80% {
          transform: translateY(3px) skewY(0) scale(0.98);
        }
        100% {
          opacity: 1;
          transform: translateY(0) skewY(0) scale(1);
        }
      }
      @keyframes subtitleReveal {
        0% {
          opacity: 0;
          letter-spacing: 1em;
          transform: scaleX(1.3);
          filter: blur(6px);
        }
        50% {
          opacity: 0.7;
          filter: blur(1px);
        }
        100% {
          opacity: 1;
          letter-spacing: 0.22em;
          transform: scaleX(1);
          filter: blur(0);
        }
      }
      @keyframes dividerExpand {
        0% {
          transform: scaleX(0);
          opacity: 0;
        }
        50% {
          box-shadow: 0 0 12px var(--gold);
        }
        100% {
          transform: scaleX(1);
          opacity: 1;
        }
      }
      @keyframes womanEntrance {
        0% {
          opacity: 0;
          transform: translateY(80px) scale(0.7) rotate(-6deg);
          filter: brightness(0.3);
        }
        40% {
          opacity: 0.8;
          filter: brightness(1.4);
        }
        70% {
          transform: translateY(-10px) scale(1.04) rotate(2deg);
        }
        85% {
          transform: translateY(4px) scale(0.98);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1) rotate(0);
        }
      }
      @keyframes lineReveal {
        0% {
          opacity: 0;
          transform: translateY(20px);
          filter: blur(3px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }
      @keyframes floralSpin {
        0% {
          opacity: 0;
          transform: scale(0) rotate(-180deg);
        }
        70% {
          transform: scale(1.2) rotate(10deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          filter: drop-shadow(0 6px 20px rgba(232, 184, 75, 0.35));
        }
        50% {
          transform: scale(1.08);
          filter: drop-shadow(0 8px 28px rgba(232, 184, 75, 0.7));
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

    <script>
      function openModal() {
        var m = document.getElementById("modal");
        var v = document.getElementById("localvideo");
        var music = document.getElementById("bg-music");

        // Pausar música de fondo
        music.pause();

        m.classList.add("active");
        document.body.style.overflow = "hidden";

        v.currentTime = 0;
        v.play().catch(function () {});

        if (v.requestFullscreen) {
          v.requestFullscreen().catch(function () {});
        } else if (v.webkitEnterFullscreen) {
          v.webkitEnterFullscreen();
        } else if (v.webkitRequestFullscreen) {
          v.webkitRequestFullscreen();
        }
      }
      function closeModal() {
        var m = document.getElementById("modal");
        var v = document.getElementById("localvideo");
        var music = document.getElementById("bg-music");

        m.classList.remove("active");

        v.pause();
        v.currentTime = 0;

        // Reanudar música de fondo
        music.play().catch(function () {});

        document.body.style.overflow = "";

        if (document.exitFullscreen && document.fullscreenElement) {
          document.exitFullscreen();
        } else if (
          document.webkitExitFullscreen &&
          document.webkitFullscreenElement
        ) {
          document.webkitExitFullscreen();
        }
      }
      document.addEventListener("fullscreenchange", function () {
        if (!document.fullscreenElement) {
          /* modal sigue visible fuera de FS */
        }
      });
      document.addEventListener("webkitfullscreenchange", function () {
        if (!document.webkitFullscreenElement) {
          /* igual */
        }
      });
      const video = document.getElementById("localvideo");
      const music = document.getElementById("bg-music");

      video.addEventListener("ended", () => {
        music.play().catch(() => {});
      });
      // Generate confetti
      const container = document.getElementById("confetti");
      const colors = [
        "#e07a9a",
        "#e8b84b",
        "#7ab8e8",
        "#a87ae8",
        "#7ae8a0",
        "#f09ab8",
        "#f0cc78",
      ];
      const shapes = ["confetti-rect", "confetti-circle", "confetti-star"];

      for (let i = 0; i < 40; i++) {
        const p = document.createElement("div");
        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        p.className = "confetti-piece " + shape;
        p.style.left = Math.random() * 100 + "vw";
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDuration = 5 + Math.random() * 9 + "s";
        p.style.animationDelay = Math.random() * 12 + "s";
        p.style.transform = `rotate(${Math.random() * 360}deg) scale(${0.5 + Math.random() * 1})`;
        container.appendChild(p);
      }
    </script>
